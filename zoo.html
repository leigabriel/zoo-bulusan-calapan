<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #a3d8ff;
            touch-action: none;
            font-family: 'Segoe UI', Tahoma, sans-serif;
        }

        canvas {
            display: block;
        }

        #stickBase {
            position: absolute;
            bottom: 40px;
            left: 40px;
            width: 120px;
            height: 120px;
            border-radius: 60px;
            background: rgba(0, 0, 0, 0.25);
            border: 2px solid rgba(255, 255, 255, 0.3);
            z-index: 10;
        }

        #stick {
            position: absolute;
            width: 60px;
            height: 60px;
            left: 30px;
            top: 30px;
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.6);
            pointer-events: none;
            z-index: 5;
        }

        .label {
            font-size: 14px;
            opacity: 0.8;
        }
    </style>
</head>

<body>

    <div id="ui">
        <b style="font-size: 20px;">Cartoon Zoo Explorer</b><br>
        <span class="label">PC: WASD to Move | Click-Drag to Look</span><br>
        <span class="label">Mobile: Joystick to Move | Drag to Look</span>
    </div>
    <div id="stickBase">
        <div id="stick"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

    <script>
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xa3d8ff);
        scene.fog = new THREE.Fog(0xa3d8ff, 60, 500);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        document.body.appendChild(renderer.domElement);

        const ambient = new THREE.HemisphereLight(0xffffff, 0x4f7d4d, 1.3);
        scene.add(ambient);

        const sun = new THREE.DirectionalLight(0xfffbe6, 2.8);
        sun.position.set(100, 150, 50);
        sun.castShadow = true;
        sun.shadow.mapSize.set(2048, 2048);
        sun.shadow.camera.left = -300;
        sun.shadow.camera.right = 300;
        sun.shadow.camera.top = 300;
        sun.shadow.camera.bottom = -300;
        scene.add(sun);

        const loader = new THREE.TextureLoader();
        const grassTex = loader.load('https://threejs.org/examples/textures/terrain/grasslight-big.jpg');
        grassTex.wrapS = grassTex.wrapT = THREE.RepeatWrapping;
        grassTex.repeat.set(128, 128);

        const getHeight = (x, z) => {
            return Math.sin(x * 0.04) * 2.5 + Math.cos(z * 0.04) * 2.5 + Math.sin(x * 0.01) * 12;
        };

        const terrainGeo = new THREE.PlaneGeometry(1000, 1000, 128, 128);
        const posAttr = terrainGeo.attributes.position;
        for (let i = 0; i < posAttr.count; i++) {
            posAttr.setZ(i, getHeight(posAttr.getX(i), posAttr.getY(i)));
        }
        terrainGeo.computeVertexNormals();

        const ground = new THREE.Mesh(terrainGeo, new THREE.MeshStandardMaterial({ map: grassTex, roughness: 1 }));
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        function createCloud() {
            const group = new THREE.Group();
            const mat = new THREE.MeshLambertMaterial({ color: 0xffffff, transparent: true, opacity: 0.85 });
            for (let i = 0; i < 4; i++) {
                const mesh = new THREE.Mesh(new THREE.SphereGeometry(3, 8, 8), mat);
                mesh.position.set(i * 3, Math.random() * 2, Math.random() * 2);
                mesh.scale.setScalar(1 + Math.random() * 2);
                group.add(mesh);
            }
            group.position.set((Math.random() - 0.5) * 800, 70 + Math.random() * 30, (Math.random() - 0.5) * 800);
            scene.add(group);
            return group;
        }
        const clouds = Array.from({ length: 20 }, createCloud);

        function createBushyTree(x, z) {
            const h = getHeight(x, z);
            const group = new THREE.Group();
            const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.7, 6, 8), new THREE.MeshStandardMaterial({ color: 0x5d4037 }));
            trunk.position.y = 3;
            trunk.castShadow = true;
            group.add(trunk);
            const leafMat = new THREE.MeshStandardMaterial({ color: 0x2e7d32 });
            for (let i = 0; i < 8; i++) {
                const s = new THREE.Mesh(new THREE.SphereGeometry(3, 8, 8), leafMat);
                s.position.set((Math.random() - 0.5) * 4, 6 + Math.random() * 4, (Math.random() - 0.5) * 4);
                s.castShadow = true;
                group.add(s);
            }
            group.position.set(x, h, z);
            scene.add(group);
        }
        for (let i = 0; i < 300; i++) createBushyTree((Math.random() - 0.5) * 800, (Math.random() - 0.5) * 800);

        class Animal {
            constructor(type, color, scale = 1) {
                this.group = new THREE.Group();
                this.type = type;
                this.mat = new THREE.MeshStandardMaterial({ color: color });
                this.legs = [];
                this.wings = [];
                this.initModel();
                this.group.scale.setScalar(scale);
                this.pos = new THREE.Vector3((Math.random() - 0.5) * 400, 0, (Math.random() - 0.5) * 400);
                this.angle = Math.random() * Math.PI * 2;
                this.timer = 0;
                this.state = 'walk';
                this.altitude = (['dove', 'parrot', 'eagle'].includes(type)) ? 15 + Math.random() * 15 : 0;
                scene.add(this.group);
            }

            initModel() {
                const body = new THREE.Mesh(new THREE.CapsuleGeometry(0.5, 0.9, 4, 8), this.mat);
                body.rotation.z = Math.PI / 2;
                body.castShadow = true;
                this.group.add(body);

                this.head = new THREE.Group();
                this.head.position.set(0.8, 0.4, 0);
                const skull = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.5, 0.5), this.mat);
                this.head.add(skull);
                this.group.add(this.head);

                if (['dove', 'parrot', 'eagle'].includes(this.type)) {
                    const wL = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.05, 1.8), this.mat);
                    wL.position.set(0, 0.3, 1);
                    const wR = wL.clone();
                    wR.position.z = -1;
                    this.wings.push(wL, wR);
                    this.group.add(wL, wR);
                } else {
                    const lp = [[0.5, 0.4], [0.5, -0.4], [-0.5, 0.4], [-0.5, -0.4]];
                    lp.forEach(p => {
                        const l = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.1, 1), this.mat);
                        l.position.set(p[0], -0.6, p[1]);
                        l.castShadow = true;
                        this.legs.push(l);
                        this.group.add(l);
                    });
                    if (this.type === 'tiger') this.mat.roughness = 0.5;
                    if (this.type === 'deer') {
                        const antL = new THREE.Mesh(new THREE.BoxGeometry(0.1, 1, 0.1), this.mat);
                        antL.position.set(0.2, 0.8, 0.3); this.head.add(antL);
                        const antR = antL.clone(); antR.position.z = -0.3; this.head.add(antR);
                    }
                }
            }

            update(t) {
                this.timer -= 0.016;
                if (this.timer < 0) {
                    this.state = Math.random() > 0.4 ? 'walk' : 'idle';
                    this.timer = 2 + Math.random() * 5;
                    this.angle += (Math.random() - 0.5) * 3;
                }

                if (this.state === 'walk') {
                    const speed = (this.type === 'tiger' || this.type === 'horse') ? 0.18 : 0.08;
                    this.pos.x += Math.cos(this.angle) * speed;
                    this.pos.z -= Math.sin(this.angle) * speed;
                    this.group.rotation.y = this.angle;
                    this.legs.forEach((l, i) => l.rotation.z = Math.sin(t * 12 + (i % 2 ? 0 : Math.PI)) * 0.5);
                    this.wings.forEach((w, i) => w.rotation.x = Math.sin(t * 18) * (i === 0 ? 1 : -1));
                }
                const h = getHeight(this.pos.x, this.pos.z);
                this.group.position.set(this.pos.x, h + 1.2 + this.altitude, this.pos.z);
            }
        }

        const animalSpecs = [
            { t: 'monkey', c: 0x6d4c41 }, { t: 'dove', c: 0xffffff, s: 0.4 }, { t: 'parrot', c: 0x388e3c, s: 0.5 },
            { t: 'eagle', c: 0x455a64, s: 0.8 }, { t: 'ostrich', c: 0x212121, s: 1.3 }, { t: 'deer', c: 0x8d6e63 },
            { t: 'rabbit', c: 0xeeeeee, s: 0.4 }, { t: 'tiger', c: 0xef6c00 }, { t: 'horse', c: 0x4e342e, s: 1.2 },
            { t: 'donkey', c: 0x757575 }
        ];
        const animals = animalSpecs.map(s => new Animal(s.t, s.c, s.s || 1));

        let keys = {};
        let yaw = 0, pitch = 0, mX = 0, mY = 0;
        let sActive = false, lActive = false, lx = 0, ly = 0;

        document.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
        document.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

        const base = document.getElementById("stickBase"), stick = document.getElementById("stick");
        base.addEventListener("touchstart", e => { sActive = true; e.preventDefault(); }, { passive: false });
        window.addEventListener("touchstart", e => { if (e.target.id !== "stick" && e.target.id !== "stickBase") { lActive = true; lx = e.touches[0].clientX; ly = e.touches[0].clientY; } });
        window.addEventListener("touchmove", e => {
            if (sActive) {
                const r = base.getBoundingClientRect();
                let x = e.touches[0].clientX - r.left - 60, y = e.touches[0].clientY - r.top - 60;
                x = Math.max(-40, Math.min(40, x)); y = Math.max(-40, Math.min(40, y));
                mX = x / 40; mY = y / 40;
                stick.style.left = (x + 30) + "px"; stick.style.top = (y + 30) + "px";
            } else if (lActive) {
                yaw -= (e.touches[0].clientX - lx) * 0.006; pitch -= (e.touches[0].clientY - ly) * 0.006;
                pitch = Math.max(-1.4, Math.min(1.4, pitch));
                lx = e.touches[0].clientX; ly = e.touches[0].clientY;
            }
        });
        window.addEventListener("touchend", () => { sActive = lActive = false; mX = mY = 0; stick.style.left = stick.style.top = "30px"; });

        window.addEventListener("mousemove", e => {
            if (!('ontouchstart' in window) && e.buttons === 1) {
                yaw -= e.movementX * 0.004; pitch -= e.movementY * 0.004;
                pitch = Math.max(-1.4, Math.min(1.4, pitch));
            }
        });

        function handleMovement() {
            const s = 0.55;
            const f = new THREE.Vector3(-Math.sin(yaw), 0, -Math.cos(yaw));
            const r = new THREE.Vector3(-Math.cos(yaw), 0, Math.sin(yaw));

            if (keys["w"]) camera.position.add(f.clone().multiplyScalar(s));
            if (keys["s"]) camera.position.add(f.clone().multiplyScalar(-s));
            if (keys["a"]) camera.position.add(r.clone().multiplyScalar(-s));
            if (keys["d"]) camera.position.add(r.clone().multiplyScalar(s));

            camera.position.add(f.clone().multiplyScalar(-mY * s));
            camera.position.add(r.clone().multiplyScalar(mX * s));
            camera.position.y = getHeight(camera.position.x, camera.position.z) + 4;
            camera.rotation.set(pitch, yaw, 0, 'YXZ');
        }

        function animate() {
            requestAnimationFrame(animate);
            const t = performance.now() * 0.001;
            handleMovement();
            animals.forEach(a => a.update(t));
            clouds.forEach(c => {
                c.position.x += 0.05;
                if (c.position.x > 500) c.position.x = -500;
            });
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener("resize", () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>

</html>
