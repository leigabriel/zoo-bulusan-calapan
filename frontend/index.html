<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ─── Theme Color (mobile browser tab / address bar) ─── -->
    <!-- Applies in both light and dark mode via media queries  -->
    <meta name="theme-color" content="#c6fe69" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#c6fe69" media="(prefers-color-scheme: dark)" />
    <meta name="msapplication-navbutton-color" content="#c6fe69" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-capable" content="yes" />

    <!-- ─── PWA Manifest (enables tab/title-bar color on desktop when installed) ─── -->
    <link rel="manifest" href="/manifest.json" />

    <!-- ─── Primary Meta ─── -->
    <title>Bulusan Zoo</title>
    <meta name="title" content="Bulusan Zoo" />
    <meta name="description"
        content="Explore Bulusan Zoo in Calapan. Discover animals, plants, and educational exhibits focused on wildlife conservation and environmental awareness." />
    <meta name="keywords" content="Bulusan Zoo, Calapan Zoo, wildlife, animals, conservation, zoo Philippines" />
    <meta name="author" content="Bulusan Zoo" />

    <!-- ─── Open Graph ─── -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Bulusan Zoo" />
    <meta property="og:title" content="Bulusan Zoo" />
    <meta property="og:description"
        content="Explore Bulusan Zoo in Calapan. Discover animals, plants, and conservation exhibits." />
    <meta property="og:url" content="https://bulusanzoo.vercel.app" />
    <meta property="og:image" content="https://bulusanzoo.vercel.app/bulusan.webp" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- ─── Twitter Card ─── -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Bulusan Zoo" />
    <meta name="twitter:description"
        content="Explore Bulusan Zoo in Calapan. Discover animals, plants, and conservation exhibits." />
    <meta name="twitter:image" content="https://bulusanzoo.vercel.app/bulusan.webp" />

    <!-- ─── Favicon ─── -->
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/128/12801/12801273.png" />
    <link rel="shortcut icon" href="https://cdn-icons-png.flaticon.com/128/12801/12801273.png" type="image/png" />
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/128/12801/12801273.png" />

    <!-- ─── Font Awesome ─── -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
</body>

</html>
